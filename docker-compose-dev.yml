services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: Gamblio.Site
    ports:
      - "3003:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - gamblio_site_network

networks:
  gamblio_site_network:
    name: gamblio_site_network
    driver: bridge